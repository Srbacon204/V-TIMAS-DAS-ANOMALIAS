<style>
body{
  margin:0;

  background:#030712;

/* topo */
.header{
  text-align:center;
  padding:20px;
  font-size:24px;
  letter-spacing:3px;

}

  background:#06142a;

  margin-bottom:20px;

}

/* imagem */
.photo{

  height:200px;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#555;
  font-size:12px;
}

/* texto */

  padding:15px;

}

.name{
  color:#4aa3ff;
  font-weight:bold;
  margin-bottom:10px;
  font-size:18px;
}

.desc{

</style>
