<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>CNA - VÍTIMAS</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#030712;
  color:#d6e6ff;
}

/* topo */
.header{
  text-align:center;
  padding:20px;
  font-size:22px;
  letter-spacing:3px;
  color:#1e90ff;
  border-bottom:1px solid #1e90ff;
}

.sub{
  text-align:center;
  font-size:13px;
  color:#9cc9ff;
  margin-bottom:20px;
}

/* container */
.container{
  width:95%;
  margin:auto;
}

/* bloco */
.profile{
  display:flex;
  gap:15px;
  background:#06142a;
  border:1px solid #0d3b7a;
  margin-bottom:20px;
  padding:10px;
  box-shadow:0 0 10px #001a66;
}

/* imagem */
.photo{
  width:120px;
  height:120px;
  object-fit:cover;
  background:#000;
}

/* texto */
.info{
  flex:1;
}

.name{
  color:#4aa3ff;
  font-weight:bold;
  margin-bottom:5px;
}

.desc{
  font-size:13px;
}

/* celular */
@media(max-width:600px){
  .profile{
    flex-direction:column;
    align-items:center;
    text-align:center;
  }

  .photo{
    width:100%;
    height:auto;
  }
}

</style>
</head>

<body>

<div class="header">
CNA // ARQUIVO DE VÍTIMAS
</div>

<div class="sub">
Registros classificados de indivíduos afetados por anomalias.
</div>

<div class="container">

<!-- VÍTIMA -->
<div class="profile">
  <img src="Screenshot_20260609-021156~2.png" class="photo">

  <div class="info">
    <div class="name">DAVID JERSON</div>
    <div class="desc">
      Vítima 158 da anomalia Gato de carne.
      Status: encontrado.
    </div>
  </div>
</div>

<!-- OUTRAS -->
<div class="profile">
  <div class="photo">FOTO AQUI</div>

  <div class="info">
    <div class="name">NOME DA VÍTIMA</div>
    <div class="desc">Descrição da vítima.</div>
  </div>
</div>

</div>

</body>
</html>
